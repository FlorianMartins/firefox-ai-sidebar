<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="sidebar.css" />
    <title>AI Sidebar</title>
  </head>
  <body>
    <header class="topbar">
      <div class="row">
        <select id="provider" title="Fournisseur"></select>
        <select id="model" title="Modèle"></select>
        <button id="refreshModels" class="icon" title="Rafraîchir la liste des modèles">⟳</button>
      </div>
      <div class="row">
        <label class="toggle" title="Afficher le raisonnement du modèle">
          <input type="checkbox" id="thinking" />
          <span>💭</span>
        </label>
        <label class="toggle" title="Recherche web (Claude)">
          <input type="checkbox" id="webSearch" />
          <span>🌐</span>
        </label>
        <label class="toggle" title="Le modèle peut agir dans le navigateur">
          <input type="checkbox" id="agentMode" />
          <span>Agent</span>
        </label>
        <label class="toggle" title="L'IA voit la page consultée">
          <input type="checkbox" id="pageCtx" />
          <span>👁</span>
        </label>
        <button id="newChat" class="icon" title="Nouvelle conversation">＋</button>
        <button id="openOptions" class="icon" title="Réglages">⚙</button>
      </div>
    </header>

    <div id="pageBar" class="pagebar hidden" title="Page vue par l'IA">
      <span class="eye">👁</span>
      <span id="pageTitle" class="page-title"></span>
    </div>

    <main id="messages" class="messages">
      <div class="empty" id="empty">
        <p><b>Sidebar IA</b> — branchez votre propre IA.</p>
        <p class="muted">
          Claude, OpenAI, Gemini, Mistral, Groq, DeepSeek, OpenRouter, ou un modèle
          <b>local</b> (Ollama / LM Studio). Renseignez votre clé dans
          <a href="#" id="emptyOptions">⚙ Réglages</a>, puis posez une question ou
          utilisez les actions rapides ci-dessous.
        </p>
      </div>
    </main>

    <div id="confirmBar" class="confirm hidden">
      <span id="confirmText"></span>
      <div class="confirm-actions">
        <button id="confirmAllow" class="ok">Autoriser</button>
        <button id="confirmDeny" class="no">Refuser</button>
      </div>
    </div>

    <div class="quickbar" id="quickbar">
      <button class="quick" data-action="summarize" title="Résumer la page">📝 Résumer</button>
      <button class="quick" data-action="translate" title="Traduire la page ou la sélection">🌐 Traduire</button>
      <button class="quick" data-action="improve" title="Améliorer le texte sélectionné">✨ Améliorer</button>
      <button class="quick" data-action="research" title="Rechercher des infos">🔍 Rechercher</button>
      <button class="quick" data-action="image" title="Générer une image">🎨 Image</button>
    </div>

    <footer class="composer">
      <textarea id="input" rows="2" placeholder="Écrivez un message…"></textarea>
      <button id="send" title="Envoyer">➤</button>
      <button id="stop" class="hidden" title="Stop">■</button>
    </footer>

    <script src="../../vendor/marked.min.js"></script>
    <script src="../../vendor/purify.min.js"></script>
    <script type="module" src="sidebar.js"></script>
  </body>
</html>
