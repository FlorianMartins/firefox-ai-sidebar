name: Update model catalogue

# Keeps src/lib/models.js fresh automatically: adds newly released OpenRouter models
# and drops ones a provider removed. Runs daily and on manual dispatch. Commits the
# diff straight to the default branch when something changed.

on:
  schedule:
    - cron: "17 6 * * *" # daily, ~06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh OpenRouter model catalogue
        run: node scripts/update-models.mjs

      - name: Commit changes (if any)
        run: |
          if [[ -n "$(git status --porcelain src/lib/models.js)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/lib/models.js
            git commit -m "chore(models): daily auto-update from OpenRouter catalogue"
            git push
          else
            echo "No model changes today."
          fi
