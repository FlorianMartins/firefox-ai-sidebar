<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="g" x1="14" y1="18" x2="82" y2="80" gradientUnits="userSpaceOnUse">
