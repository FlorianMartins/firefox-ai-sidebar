<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="AI Sidebar">
  <defs>
    <linearGradient id="g" x1="10" y1="8" x2="86" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <!-- Modern mark mirroring the product itself: a gradient app tile (squircle) showing
       the new UI layout — a left activity rail plus the work-area content lines. Flat,
       no framing border, transparent canvas, legible down to favicon size. -->
  <rect x="6" y="6" width="84" height="84" rx="24" fill="url(#g)"/>
  <!-- Left activity rail (vertically centred against the content lines) -->
  <rect x="21" y="28" width="12" height="40" rx="6" fill="#ffffff"/>
  <!-- Work-area content lines: evenly spaced, gently tapering, all left-aligned, solid white -->
  <rect x="43" y="28" width="32" height="8" rx="4" fill="#ffffff"/>
  <rect x="43" y="44" width="26" height="8" rx="4" fill="#ffffff"/>
  <rect x="43" y="60" width="18" height="8" rx="4" fill="#ffffff"/>
</svg>
