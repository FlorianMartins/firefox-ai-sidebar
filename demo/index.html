<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Reuses the REAL sidebar CSS -->
    <link rel="stylesheet" href="../src/sidebar/sidebar.css" />
    <title>AI Sidebar — démo de rendu</title>
    <style>html, body { height: 100%; }</style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="../icons/icon.svg" alt="" class="brand-logo" />
        <span class="brand-name">AI Sidebar</span>
      </div>
      <div class="row">
        <button class="icon">🕘</button><button class="icon">＋</button><button class="icon">⚙</button>
      </div>
    </header>

    <nav class="modebar">
      <button class="mode active">💬 Chat</button>
      <button class="mode">🌐 Traduire</button>
      <button class="mode">✨ Améliorer</button>
      <button class="mode">🎨 Image</button>
      <button class="mode">⌨ Terminal</button>
    </nav>

    <div class="pagebar">
      <span class="eye">👁</span>
      <span class="page-title">OAuth 2.0 — RFC 6749 (datatracker.ietf.org)</span>
      <button class="icon">📑</button>
    </div>

    <main id="messages" class="messages"></main>

    <div class="controls">
      <div class="ctl-group" id="chatControls">
        <label class="chip"><input type="checkbox" checked /><span>💭 Réflexion</span></label>
        <label class="chip"><input type="checkbox" /><span>🌐 Web</span></label>
        <label class="chip"><input type="checkbox" /><span>🤖 Agent</span></label>
        <label class="chip"><input type="checkbox" checked /><span>👁 Page</span></label>
      </div>
    </div>

    <div class="modelbar">
      <div class="srcseg">
        <button class="seg active" data-src="api">🔑 API</button>
        <button class="seg" data-src="account">👤 Compte</button>
      </div>
      <div class="modelrow">
        <div class="select-wrap">
          <select>
            <optgroup label="🔑 Claude (Anthropic)"><option>Claude Opus 4.8</option></optgroup>
            <optgroup label="🔑 OpenAI"><option>GPT-4o</option></optgroup>
          </select>
        </div>
        <button class="icon">⟳</button>
      </div>
    </div>

    <footer class="composer">
      <textarea rows="1" placeholder="Écrivez un message…">Code-moi un petit jeu auquel je peux jouer ici</textarea>
      <button class="btn-grad send">➤</button>
    </footer>

    <!-- Real vendored libs -->
    <script src="../vendor/marked.min.js"></script>
    <script src="../vendor/purify.min.js"></script>
    <script type="module">
      window.browser = { runtime: { getURL: (p) => new URL("../" + p, location.href).href } };
      import { configureMarkdown, renderMarkdown, enhanceArtifacts } from "../src/lib/markdown.js";

      const messages = document.getElementById("messages");
      function addMsg(role, html) {
        const d = document.createElement("div");
        d.className = "msg " + role;
        if (role === "user") d.textContent = html;
        else d.innerHTML = html;
        messages.appendChild(d);
        return d;
      }
      function addThink(text) {
        const d = document.createElement("details");
        d.className = "think"; d.open = true;
        d.innerHTML = '<summary>💭 Réflexion</summary><div class="think-body"></div>';
        d.querySelector(".think-body").textContent = text;
        messages.appendChild(d);
      }

      const game = [
        '<!doctype html><html><head><meta charset="utf-8"><style>',
        "  body{margin:0;font-family:system-ui;background:#0f1117;color:#e7e8ef;text-align:center}",
        "  #b{font:600 14px system-ui;color:#9aa0b4;padding:8px}",
        "  #t{position:absolute;width:46px;height:46px;border-radius:50%;cursor:pointer;",
        "     background:linear-gradient(135deg,#6366f1,#a855f7);box-shadow:0 4px 14px rgba(124,58,237,.5)}",
        "</style></head><body>",
        '  <div id="b">Score : <span id="s">0</span> — attrape la cible !</div>',
        '  <div id="t" style="left:120px;top:90px"></div>',
        "  <script>",
        "   var s=0,t=document.getElementById('t');",
        "   function move(){t.style.left=(20+Math.random()*240)+'px';t.style.top=(50+Math.random()*150)+'px';}",
        "   t.onclick=function(){s++;document.getElementById('s').textContent=s;move();};",
        "   setInterval(move,900);",
        "  <\/script>",
        "</body></html>",
      ].join("\n");

      const sample = [
        "Voici un **mini-jeu** jouable directement dans l'artifact 👇",
        "Clique sur la cible qui se déplace pour marquer des points.",
        "",
        "```html",
        game,
        "```",
      ].join("\n");

      configureMarkdown();
      addMsg("user", "Code-moi un petit jeu auquel je peux jouer ici");
      addThink("L'utilisateur veut un jeu jouable. Je renvoie un document HTML autonome et interactif : il s'exécutera dans l'artifact sandboxé et sera directement jouable.");
      const a = addMsg("assistant", renderMarkdown(sample));
      enhanceArtifacts(a);
      // Per-message compare bar (static demo)
      const bar = document.createElement("div");
      bar.className = "msg-actions";
      bar.innerHTML =
        '<span class="cmp-lbl">⚖ Comparer avec</span>' +
        '<select class="cmp-select"><option>GPT-4o</option><option>Gemini 2.5 Pro</option></select>' +
        '<button class="cmp-btn">Comparer</button>';
      a.appendChild(bar);
      setTimeout(() => { document.body.dataset.ready = "1"; }, 1600);
    </script>
  </body>
</html>
